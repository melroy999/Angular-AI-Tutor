<form [formGroup]="form" (ngSubmit)="submit()" #nativeFormRef="ngForm">
    <mat-form-field class="full-width">
        <mat-label>Name</mat-label>
        <input type="text" matInput formControlName="name" />
    </mat-form-field>
    <mat-form-field class="full-width">
        <mat-label>Description</mat-label>
        <input type="text" matInput formControlName="description" />
    </mat-form-field>
    <mat-form-field class="full-width">
        <mat-label>Author</mat-label>
        <input type="email" matInput formControlName="authorEmail" />
    </mat-form-field>
    <button matButton="filled" type="submit" [disabled]="submitting()">Send</button>
</form>

<a [routerLink]="['/recipes']">Return</a>
